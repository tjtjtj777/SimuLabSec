spring:
  sql:
    init:
      mode: never

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    com.simulab: ${LOG_LEVEL_SIMULAB:INFO}

simulab:
  demo:
    initialize-enabled: false
  security:
    cors:
      allowed-origins: ${SIMULAB_CORS_ALLOWED_ORIGINS:https://simulab.top,https://www.simulab.top}
      allow-credentials: ${SIMULAB_CORS_ALLOW_CREDENTIALS:true}
